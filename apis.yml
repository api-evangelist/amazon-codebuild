aid: amazon-codebuild
name: Amazon CodeBuild
description: >-
  AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces
  ready-to-deploy software packages. CodeBuild scales continuously and processes multiple builds concurrently so your
  builds are not left waiting in a queue. It supports popular build environments for Java, Python, Node.js, Ruby,
  Go, Android, .NET Core, Docker, and more. CodeBuild integrates with AWS CodePipeline, GitHub, Bitbucket, and
  other source providers for end-to-end CI/CD workflows.
