  - type: Features
    data:
      - name: Fully Managed Build Service
        description: >-
          No need to provision, manage, or scale build servers. AWS handles all infrastructure management so you
          can focus on writing code.
      - name: Continuous Scaling
        description: >-
          Automatically scales to meet peak build demand. Processes multiple builds concurrently so builds are
          never left waiting in a queue.
      - name: Pre-configured Build Environments
        description: >-
          Out-of-the-box build environments for Java, Python, Node.js, Ruby, Go, Android, .NET Core, Docker, and
          more. Customize with your own build tools.
      - name: Build Batches
        description: >-
          Run multiple related builds in parallel as a batch sharing the same source configuration and retrieve
          combined results for the entire batch.
      - name: Test Reports
        description: >-
          Collect and analyze test results from unit tests, integration tests, and code coverage reports. Track
          test trends and identify flaky tests.
      - name: Source Integration
        description: >-
          Integrate with CodeCommit, GitHub, GitHub Enterprise, GitLab, Bitbucket, and Amazon S3 as source
          providers with webhook support for automatic build triggering.
      - name: VPC Support
        description: >-
          Run builds inside a VPC for access to private resources, configuring VPC settings including subnets and
          security groups for build environments.
      - name: Build Caching
        description: >-
          Cache build dependencies in Amazon S3 or locally within the build environment to speed up subsequent
          builds and reduce build times.
      - name: Custom Build Environments
        description: >-
          Use your own Docker images as build environments, pulling from Amazon ECR or Docker Hub for fully
          customized build configurations.
      - name: Pay-Per-Build Pricing
        description: >-
          Pay only for the build minutes you consume with no upfront costs or long-term commitments for on-demand
          build capacity.
  - type: UseCases
    data:
      - name: Continuous Integration Pipelines
        description: >-
          Automatically compile, test, and validate code changes on every commit to catch issues early and
          maintain code quality across development teams.
      - name: Automated Testing
        description: >-
          Run unit tests, integration tests, and end-to-end tests as part of every build to ensure code
          correctness and prevent regressions.
      - name: Docker Image Building
        description: >-
          Build and push Docker container images to Amazon ECR as part of a containerized application deployment
          workflow.
      - name: Multi-Environment Build Matrix
        description: >-
          Use build batches to test across multiple runtime versions or configurations in parallel, identifying
          compatibility issues efficiently.
      - name: AWS CodePipeline Integration
        description: >-
          Use CodeBuild as the build and test stage in an AWS CodePipeline CD pipeline for fully automated code
          delivery from commit to deployment.
  - type: Integrations
    data:
      - name: AWS CodePipeline
        description: Add CodeBuild as build or test actions in CodePipeline deployment stages.
      - name: AWS CodeCommit
        description: Use CodeCommit repositories as source for CodeBuild projects with webhook triggers.
      - name: GitHub
        description: Integrate with GitHub repositories and pull request builds using webhooks.
      - name: GitLab
        description: Use GitLab repositories as source for CodeBuild projects.
      - name: Bitbucket
        description: Integrate with Bitbucket repositories for cloud-based CI.
      - name: Amazon ECR
        description: Pull custom build environment images from ECR and push built container images.
      - name: Amazon S3
        description: Store build artifacts and cache build dependencies in S3 buckets.
      - name: AWS IAM
        description: Control access to build projects and builds with fine-grained IAM permissions.
      - name: Amazon CloudWatch
        description: Monitor build metrics and set alarms on build duration, failure rates, and queued builds.
      - name: AWS Secrets Manager
        description: Securely inject secrets and environment variables into build environments.
