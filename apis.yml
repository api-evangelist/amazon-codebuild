apis:
  - aid: amazon-codebuild:amazon-codebuild-api
    name: Amazon CodeBuild API
    description: >-
      The Amazon CodeBuild REST API enables programmatic management of build projects, builds, report groups, and
      source credentials. Create and configure build projects with custom environments, start and stop builds,
      retrieve build logs and artifacts, manage build batches, and configure webhooks for source providers.
